apiVersion: sim.platform/v0.2
kind: Contract

metadata:
  name: ackermann_vehicle
  description: >
    Platform contract for car-like ground vehicles with steering and
    throttle/brake control.

spec:
  contractType: platform

  semantics:
    locomotion: ackermann
    groundVehicle: true

  compatibleCommandContracts:
    - ackermann_vehicle_control
