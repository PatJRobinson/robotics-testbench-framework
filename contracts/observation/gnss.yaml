apiVersion: sim.platform/v0.2
kind: Contract

metadata:
  name: gnss
  description: >
    Observation contract for global navigation satellite system position data.

spec:
  contractType: observation

  representation:
    class: ros_topic
    messageType: sensor_msgs/msg/NavSatFix

  semantics:
    modality: global_position
    timeStamped: true

  notes:
    - >
      Coordinate frame, map origin, datum, and noise model are
      realisation-specific unless further constrained.
