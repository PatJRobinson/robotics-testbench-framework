apiVersion: sim.platform/v0.2
kind: Contract

metadata:
  name: imu
  description: >
    Observation contract for inertial measurement data.

spec:
  contractType: observation

  representation:
    class: ros_topic
    messageType: sensor_msgs/msg/Imu

  semantics:
    includes:
      - orientation
      - angular_velocity
      - linear_acceleration
    timeStamped: true

  notes:
    - >
      Noise model, covariance, frame, and gravity handling are
      realisation-specific unless further constrained.
