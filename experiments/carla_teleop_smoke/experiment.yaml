apiVersion: sim.platform/v0.1
kind: Experiment

metadata:
  name: carla_teleop_smoke
  description: >
    Minimal CARLA smoke test. Launches the CARLA urban_teleop realisation,
    starts a basic control app, and verifies that the ego vehicle can move.

spec:
  mode: scripted

  appRef: carla_teleop
  realisationRef: urban_teleop@carla

  successCriteria:
    description: >
      The CARLA server becomes reachable, the realisation spawns an ego vehicle,
      and the app applies control such that the vehicle pose changes.
    requires:
      - carla_rpc_available
      - scenario_client_started
      - ego_vehicle_spawned
      - app_applies_control
      - ego_vehicle_pose_changes

  perturbations: []

  outputs:
    record:
      - runs/carla_teleop_smoke/backend.log
      - runs/carla_teleop_smoke/scenario_client.log
      - selected_realisation
      - selected_app
      - experiment_result

  tags:
    - smoke_test
    - carla
    - urban_driving
    - scripted
