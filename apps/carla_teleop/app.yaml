apiVersion: sim.platform/v0.2
kind: App

metadata:
  name: carla_teleop
  description: >
    ROS-based teleoperation app for CARLA via the /cmd_vel contract.

spec:
  runtime:
    type: shell
    entrypoint: apps/carla_teleop/run.sh
    interactive: true

  requires:
    platforms:
      - contract: ackermann_vehicle

    commands:
      - contract: differential_drive_cmd_vel
        bindingConfig:
          name: /cmd_vel

  behaviour:
    mode: interactive

  tags:
    - carla
    - ros2
    - teleop
    - cmd_vel
