apiVersion: sim.platform/v0.2
kind: App

metadata:
  name: amr_teleop
  description: >
    Minimal ROS 2 teleoperation application for differential-drive AMRs.
    Intended as the first cross-backend application slice.

spec:
  category: interactive_control

  requires:
    platforms:
      - contract: differential_drive_robot

    commands:
      - contract: differential_drive_cmd_vel
        bindingConfig:
          name: /cmd_vel

    observations:
      - contract: sim_clock

  optional:
    observations:
      - contract: odometry
      - contract: tf_tree
      - contract: lidar2d

  provides:
    behaviours:
      - manual_velocity_control

  runtime:
    type: ros2_node
    entrypoint: apps/amr_teleop/run.sh

  lifecycle:
    supports:
      - start
      - stop

  constraints:
    notes:
      - >
        This application assumes a compatible realisation exposes /cmd_vel and
        /clock with valid runtime semantics.
      - >
        Odom, tf, and scan are optional and may be used for visualisation or
        later extensions, but are not required for the teleop smoke test.

  tags:
    - amr
    - teleop
    - ros2
    - differential_drive
