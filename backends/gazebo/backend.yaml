apiVersion: sim.platform/v0.1
kind: Backend

metadata:
  name: gazebo
  description: >
    Gazebo backend for general-purpose robotics simulation and lightweight AMR
    workflows.

spec:
  runtime:
    type: containerized
    engine: gazebo
    version: "ionic"

  supports:
    domains:
      - amr

    robotContracts:
      - differential_drive

    observationContracts:
      - odometry
      - tf_tree
      - lidar2d
      - rgb_camera
      - imu

    features:
      - sim_clock
      - ros2_bridge
      - headless_operation

  requires:
    infrastructure:
      - docker

    environment:
      - ROS_DISTRO=jazzy

  realizationModel:
    worldFormat: sdf
    robotBinding: native_model_or_sdf_include
    observationRealization: native

  constraints:
    notes:
      - >
        Realizations may depend on world plugins, bridge plugins, and backend-
        specific launch configuration.
      - >
        Exact observation fidelity may differ from Isaac even when the same
        observation contract is satisfied.

  excludes:
    domains: []
