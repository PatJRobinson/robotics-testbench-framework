apiVersion: sim.platform/v0.2
kind: Realisation

metadata:
  name: urban_teleop@carla
  description: >
    CARLA realisation of a minimal urban driving teleoperation scenario.
    Launches a CARLA server, loads a town map through a backend-local scenario
    client, spawns an ego vehicle, exposes observations through native ROS 2
    where available, and provides ROS-facing control through a semantic adapter.

spec:
  scenarioRef: urban_teleop
  backendRef: carla
  platformRef: ego_vehicle

  provides:
    platforms:
      - contract: ego_vehicle
      - contract: ackermann_vehicle

    commands:
      - contract: ackermann_vehicle_control
        binding:
          type: carla_python_api
          target: carla.VehicleControl
        notes:
          - >
            Native CARLA control surface for throttle, steering, brake, and
            reverse semantics.

    observations:
      - contract: sim_clock
        binding:
          type: ros_topic
          name: /clock
          messageType: rosgraph_msgs/msg/Clock

      - contract: rgb_camera
        binding:
          type: ros_topic
          topics:
            image: /carla//rgb/image
            cameraInfo: /carla//rgb/camera_info
          messageTypes:
            image: sensor_msgs/msg/Image
            cameraInfo: sensor_msgs/msg/CameraInfo
        notes:
          - >
            Exposed through CARLA native ROS 2 sensor support. Topic naming is
            currently backend-generated and may be normalised later.

    adapters:
      - name: cmd_vel_to_vehicle_control
        kind: semantic
        description: >
          Approximate adapter from differential-drive-style Twist commands to
          CARLA Ackermann-style vehicle control. This exists to support early
          ROS teleoperation, not as a faithful vehicle dynamics interface.

        provides:
          commands:
            - contract: differential_drive_cmd_vel
              binding:
                type: ros_topic
                messageType: geometry_msgs/msg/Twist
                defaultName: /cmd_vel
                configurable:
                  - name

        consumes:
          commands:
            - contract: ackermann_vehicle_control

        implementedBy:
          process: ros_control_adapter
          entrypoint: scenarios/urban_teleop/carla/ros_control_adapter.py

        limitations:
          - >
            /cmd_vel is not a native Ackermann vehicle command interface.
          - >
            Steering and reverse behaviour are approximate and should be
            replaced by a proper Ackermann command contract later.

  native:
    world:
      type: carla_map
      mapName: Town01

    platform:
      type: carla_actor
      roleName: sim_platform_ego
      rosName: ego
      blueprint: vehicle.lincoln.mkz_2020
      spawn:
        strategy: first_available_spawn_point

    scenarioClient:
      type: python_api
      entrypoint: scenarios/urban_teleop/carla/start_realisation.py
      responsibilities:
        - connect_to_server
        - load_world
        - configure_synchronous_mode
        - clean_previous_actors
        - spawn_ego_vehicle
        - attach_rgb_camera_sensor
        - expose_native_ros2_sensor_topics
        - update_spectator_camera
        - tick_world
        - cleanup_owned_actors

    sensors:
      rgbCamera:
        enabled: true
        blueprint: sensor.camera.rgb
        rosName: rgb
        roleName: rgb
        attachTo: sim_platform_ego
        attributes:
          image_size_x: 600
          image_size_y: 400
          fov: 90

      imu:
        enabled: false
        blueprint: sensor.other.imu
        attachTo: sim_platform_ego

      gnss:
        enabled: false
        blueprint: sensor.other.gnss
        attachTo: sim_platform_ego

  runtime:
    containerName: carla-sim
    processModel: multi_process

    rendering:
      mode: gui # gui | offscreen | no_rendering
      frameworkManagedView: false

    launch:
      mode: server
      command: backends/carla/run.sh
      args:
        - gui

    readiness:
      type: carla_rpc
      host: localhost
      port: 2000
      timeoutSeconds: 120

    scenarioReadiness:
      type: carla_actor
      roleName: sim_platform_ego
      timeoutSeconds: 60

    processes:
      - name: scenario_client
        type: python
        entrypoint: scenarios/urban_teleop/carla/start_realisation.py
        after:
          - backend
        args:
          - --map
          - Town01
          - --role-name
          - sim_platform_ego

      - name: ros_control_adapter
        type: ros_python
        entrypoint: scenarios/urban_teleop/carla/ros_control_adapter.py
        after:
          - scenario_client

    infrastructure:
      containerized: true
      networking: host
      gpu: true

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,utility,display,video,compute
      VK_ICD_FILENAMES: /run/opengl-driver/share/vulkan/icd.d/nvidia_icd.x86_64.json

    mounts:
      - hostPath: /run/opengl-driver
        containerPath: /run/opengl-driver
        mode: ro

  lifecycle:
    supports:
      - start
      - stop
      - reset

    resetSemantics:
      description: >
        Reset reloads the configured CARLA map, removes previous actors owned
        by this realisation, respawns the ego vehicle, reapplies scenario
        settings, and reattaches enabled sensors.

    cleanup:
      actorRoleNames:
        - sim_platform_ego
        - rgb

  constraints:
    knownIssues:
      - >
        CARLA readiness is not equivalent to the server process being alive.
        The runtime should verify RPC responsiveness before launching dependent
        clients.
      - >
        Scenario readiness is distinct from backend readiness. The app should
        not start until the ego actor exists.
      - >
        GUI mode launches a CARLA Unreal window as part of the backend process.
        This is not an attachable framework view client.
      - >
        On NixOS, rendering requires the host NVIDIA OpenGL/Vulkan driver stack
        to be mounted into the container.
      - >
        Native CARLA ROS 2 currently exposes /clock and enabled sensor topics,
        but vehicle control is provided here through a local semantic adapter.
      - >
        No-rendering mode is suitable for control tests but does not support
        rendered camera observations.

  tags:
    - av
    - urban_driving
    - teleop
    - carla
    - ros2
